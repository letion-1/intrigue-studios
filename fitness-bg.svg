  <rect x="548" y="134" width="84" height="8" rx="4" fill="#fbbf24"/>
  <rect x="538" y="122" width="18" height="32" rx="4" fill="#f97316"/>
  <rect x="558" y="126" width="12" height="24" rx="3" fill="#fb923c"/>
  <rect x="610" y="126" width="12" height="24" rx="3" fill="#fb923c"/>
  <rect x="624" y="122" width="18" height="32" rx="4" fill="#f97316"/>
  <rect x="572" y="131" width="6" height="14" rx="2" fill="#fbbf24"/>
  <rect x="602" y="131" width="6" height="14" rx="2" fill="#fbbf24"/>
</g>

<!-- WEIGHT PLATE bottom left -->
<g opacity="0.25">
