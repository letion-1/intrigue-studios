  <circle cx="90" cy="700" r="42" fill="none" stroke="#fb923c" stroke-width="4"/>
  <circle cx="90" cy="700" r="12" fill="#fbbf24"/>
  <line x1="90" y1="635" x2="90" y2="658" stroke="#fbbf24" stroke-width="3"/>
  <line x1="90" y1="742" x2="90" y2="765" stroke="#fbbf24" stroke-width="3"/>
  <line x1="25" y1="700" x2="48" y2="700" stroke="#fbbf24" stroke-width="3"/>
  <line x1="132" y1="700" x2="155" y2="700" stroke="#fbbf24" stroke-width="3"/>
  <line x1="44" y1="654" x2="60" y2="670" stroke="#fbbf24" stroke-width="3"/>
  <line x1="120" y1="730" x2="136" y2="746" stroke="#fbbf24" stroke-width="3"/>
  <line x1="136" y1="654" x2="120" y2="670" stroke="#fbbf24" stroke-width="3"/>
  <line x1="60" y1="730" x2="44" y2="746" stroke="#fbbf24" stroke-width="3"/>
</g>

<!-- WEIGHT PLATE bottom right -->
<g opacity="0.22">
