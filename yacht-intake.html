<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get Started — Intrigue Studios</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1C2333;
    --gold: #B08D57;
    --cream: #F5F3EC;
    --paper: #FFFFFF;
    --line: #E8E6DF;
    --ink-soft: #6B6B63;
    --ok: #2E6B4F;
    --err: #B03A3A;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: var(--cream);
    font-family: 'Work Sans', sans-serif;
    color: var(--navy);
    padding: 40px 20px;
  }
  .page-center { width: 100%; max-width: 480px; margin: auto; }
  .card { background: var(--paper); border: 1px solid var(--line); border-radius: 4px; padding: 40px 36px; }
  .eyebrow {
    font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--gold); margin: 0 0 10px;
  }
  h1 { font-family: 'Fraunces', serif; font-size: 30px; font-weight: 700; margin: 0 0 12px; line-height: 1.15; }
  .lede { font-size: 14px; color: var(--ink-soft); line-height: 1.5; margin: 0 0 28px; }
  label {
    display: block; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--ink-soft); margin-bottom: 6px;
  }
  .field { margin-bottom: 20px; }
  input[type="text"], input[type="email"] {
    width: 100%; padding: 12px 14px; border: 1px solid var(--line); border-radius: 3px;
    font-family: 'Work Sans', sans-serif; font-size: 14px; color: var(--navy); background: var(--paper);
  }
  input:focus { outline: 2px solid var(--gold); outline-offset: 1px; }
  .link-help { font-size: 12.5px; color: var(--ink-soft); margin: -4px 0 12px; line-height: 1.5; }
  .link-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .link-row input { flex: 1; }
  .remove-link {
    background: none; border: 1px solid var(--line); border-radius: 3px; color: var(--ink-soft);
    width: 40px; cursor: pointer; font-size: 16px;
  }
  .add-link-btn {
    background: transparent; border: 1px dashed var(--gold); color: var(--gold);
    padding: 10px 14px; border-radius: 3px; font-family: 'Work Sans', sans-serif; font-weight: 600;
    font-size: 13px; cursor: pointer; width: 100%; margin-bottom: 24px;
  }
  .add-link-btn:hover { background: rgba(176,141,87,0.08); }
  button.primary {
    width: 100%; padding: 14px; background: var(--navy); color: var(--paper); border: none;
    border-radius: 3px; font-family: 'Work Sans', sans-serif; font-weight: 600; font-size: 14px;
    cursor: pointer; transition: background 0.15s ease;
  }
  button.primary:hover { background: #2A3346; }
  button.primary:disabled { background: #9A9A93; cursor: wait; }
  .result {
    margin-top: 22px; padding: 20px; border: 1px solid var(--line); border-radius: 3px;
    background: var(--cream); text-align: center;
  }
  .result.hidden { display: none; }
  .result-title { font-family: 'Fraunces', serif; font-weight: 600; font-size: 16px; margin: 0 0 4px; }
  .result-sub { font-size: 12.5px; color: var(--ink-soft); margin: 0; line-height: 1.5; }
  .result.error .result-title { color: var(--err); }
  .result.success .result-title { color: var(--ok); }
  footer { margin-top: 32px; text-align: center; font-size: 12px; color: var(--ink-soft); }
  footer a { color: var(--ink-soft); }
</style>
</head>
<body>

<div class="page-center">
  <div class="card">
    <p class="eyebrow">Get Started</p>
    <h1>Add your fleet</h1>
    <p class="lede">Paste links to wherever your availability lives — a spreadsheet, a Dropbox file, a booking calendar, or a website. We'll read them automatically.</p>

    <div class="field">
      <label for="companyName">Company name</label>
      <input type="text" id="companyName" placeholder="e.g. Adriatic Charter">
    </div>

    <div class="field">
      <label for="email">Contact email</label>
      <input type="email" id="email" placeholder="you@example.com">
    </div>

    <label>Availability links</label>
    <p class="link-help">Add one per yacht, fleet, or booking source — up to 5.</p>
    <div id="linksContainer">
      <div class="link-row">
        <input type="text" class="link-input" placeholder="https://...">
      </div>
    </div>
    <button type="button" class="add-link-btn" id="addLinkBtn">+ Add another link</button>

    <button class="primary" id="submitBtn" type="button">Get started</button>

    <div class="result hidden" id="resultBox">
      <p class="result-title" id="resultTitle"></p>
      <p class="result-sub" id="resultSub"></p>
      <a class="add-link-btn" id="dashboardLink" style="display:none; text-align:center; text-decoration:none; margin-bottom:0;">Go to your dashboard &rarr;</a>
    </div>
  </div>

  <footer>
    <p>Intrigue Studios · <a href="mailto:team@intriguestudios.de">team@intriguestudios.de</a></p>
  </footer>
</div>

<script>
  const WEBHOOK_URL = "https://hook.eu2.make.com/klkur8tacxcue25sny4mubm4n6pw83uk";
  const MAX_LINKS = 5;

  const linksContainer = document.getElementById("linksContainer");
  const addLinkBtn = document.getElementById("addLinkBtn");
  const submitBtn = document.getElementById("submitBtn");
  const resultBox = document.getElementById("resultBox");
  const resultTitle = document.getElementById("resultTitle");
  const resultSub = document.getElementById("resultSub");

  function addLinkRow() {
    const rows = linksContainer.querySelectorAll(".link-row");
    if (rows.length >= MAX_LINKS) return;

    const row = document.createElement("div");
    row.className = "link-row";
    row.innerHTML = `
      <input type="text" class="link-input" placeholder="https://...">
      <button type="button" class="remove-link" aria-label="Remove link">&times;</button>
    `;
    linksContainer.appendChild(row);
    row.querySelector(".remove-link").addEventListener("click", () => row.remove());

    if (linksContainer.querySelectorAll(".link-row").length >= MAX_LINKS) {
      addLinkBtn.disabled = true;
      addLinkBtn.style.opacity = "0.5";
    }
  }

  addLinkBtn.addEventListener("click", addLinkRow);

  const dashboardLink = document.getElementById("dashboardLink");

  function showResult(state, title, sub, clientId) {
    resultBox.classList.remove("hidden", "success", "error");
    resultBox.classList.add(state);
    resultTitle.textContent = title;
    resultSub.textContent = sub;

    if (clientId) {
      dashboardLink.href = "yacht-dashboard.html?client=" + encodeURIComponent(clientId);
      dashboardLink.style.display = "block";
    } else {
      dashboardLink.style.display = "none";
    }
  }

  submitBtn.addEventListener("click", async () => {
    const companyName = document.getElementById("companyName").value.trim();
    const email = document.getElementById("email").value.trim();
    const links = Array.from(document.querySelectorAll(".link-input"))
      .map(input => input.value.trim())
      .filter(url => url.length > 0 && url.startsWith("http"));

    if (!companyName || !email) {
      showResult("error", "Missing information", "Please fill in your company name and email.");
      return;
    }
    if (links.length === 0) {
      showResult("error", "No links added", "Please add at least one availability link.");
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = "Setting up...";

    try {
      const res = await fetch(WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          company_name: companyName,
          email: email,
          links: links
        })
      });

      const data = await res.json();

      if (!res.ok || !data.success) {
        showResult("error", "Something went wrong", "Please try again or email us directly.");
        return;
      }

      showResult(
        "success",
        "You're all set.",
        `We're processing ${data.total_sources} source${data.total_sources === 1 ? '' : 's'} now. This usually takes a few minutes — check your dashboard shortly.`,
        data.client_id
      );
    } catch (err) {
      showResult("error", "Something went wrong submitting your links", "Please try again or email us directly.");
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = "Get started";
    }
  });
</script>

</body>
</html>
