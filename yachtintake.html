<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set up your weekly availability report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Work+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1C2333; --paper:#F3F1EA; --accent:#8C5B3F; --accent-dark:#6B4530;
    --line:rgba(28,35,51,.15); --ok:#2E6B4F; --err:#B03A3A;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--paper); color:var(--ink); font-family:'Work Sans',sans-serif; line-height:1.5;}
  .wrap{max-width:720px; margin:0 auto; padding:60px 24px 100px;}
  h1{font-family:'Fraunces',serif; font-weight:700; font-size:clamp(28px,4vw,40px); letter-spacing:-0.01em; margin:0 0 10px;}
  p.lede{opacity:.8; max-width:56ch; margin:0 0 40px;}
  label{display:block; font-family:'Space Mono',monospace; font-size:11px; text-transform:uppercase; letter-spacing:.08em; opacity:.7; margin-bottom:6px;}
  input[type=text], input[type=email], input[type=url]{
    width:100%; padding:12px 14px; border:1px solid var(--line); border-radius:2px;
    background:white; font-family:'Work Sans',sans-serif; font-size:15px; color:var(--ink);
  }
  input:focus{outline:2px solid var(--accent); outline-offset:1px;}
  .field{margin-bottom:22px;}
  .link-row{display:flex; gap:10px; margin-bottom:10px; align-items:center;}
  .link-row input{flex:1;}
  .remove-btn{
    background:none; border:1px solid var(--line); color:var(--err); border-radius:2px;
    width:38px; height:38px; cursor:pointer; font-size:16px; flex-shrink:0;
  }
  .remove-btn:hover{background:var(--err); color:white; border-color:var(--err);}
  #add-link{
    background:none; border:1px dashed var(--accent); color:var(--accent-dark);
    padding:10px 16px; border-radius:2px; cursor:pointer; font-size:14px; font-weight:600;
    margin-top:4px;
  }
  #add-link:hover{background:var(--accent); color:white;}
  .submit-btn{
    background:var(--ink); color:var(--paper); border:none; padding:16px 28px; border-radius:2px;
    font-size:15px; font-weight:600; cursor:pointer; margin-top:20px;
  }
  .submit-btn:hover{background:var(--accent-dark);}
  .submit-btn:disabled{opacity:.5; cursor:not-allowed;}
  #status{margin-top:20px; font-size:14px; padding:14px 16px; border-radius:2px; display:none;}
  #status.ok{display:block; background:#E7F1EC; color:var(--ok); border:1px solid var(--ok);}
  #status.err{display:block; background:#F6E8E8; color:var(--err); border:1px solid var(--err);}
  .hint{font-size:13px; opacity:.6; margin-top:-14px; margin-bottom:20px;}
</style>
</head>
<body>
<div class="wrap">
  <h1>Get a weekly fleet availability report</h1>
  <p class="lede">Add the links you check for availability — yard pages, listing sites, booking calendars.
     Every Monday we check them for you and send back one clean report.</p>

  <form id="intake-form">
    <div class="field">
      <label for="business-name">Brokerage name</label>
      <input type="text" id="business-name" required placeholder="e.g. Rheinblick Yacht Brokerage">
    </div>

    <div class="field">
      <label for="contact-email">Contact email</label>
      <input type="email" id="contact-email" required placeholder="you@brokerage.com">
    </div>

    <div class="field">
      <label for="port-preference">Preferred departure region (optional)</label>
      <input type="text" id="port-preference" placeholder="e.g. Western Mediterranean">
    </div>

    <div class="field">
      <label>Availability links</label>
      <div class="hint">Add one per yard, yacht, or booking page — as many as you need.</div>
      <div id="links-container">
        <div class="link-row">
          <input type="url" class="link-input" placeholder="https://" required>
        </div>
      </div>
      <button type="button" id="add-link">+ Add another link</button>
    </div>

    <button type="submit" class="submit-btn" id="submit-btn">Set up my weekly report</button>
    <div id="status"></div>
  </form>
</div>

<script>
const WEBHOOK_URL = "https://hook.eu2.make.com/1qi7tcve6hlx1wrqjdokd1w4xhy7lpj1";

const container = document.getElementById('links-container');
document.getElementById('add-link').addEventListener('click', () => {
  const row = document.createElement('div');
  row.className = 'link-row';
  row.innerHTML = `<input type="url" class="link-input" placeholder="https://">
    <button type="button" class="remove-btn" aria-label="Remove link">×</button>`;
  container.appendChild(row);
  row.querySelector('.remove-btn').addEventListener('click', () => row.remove());
});

function slugify(str){
  return str.toLowerCase().trim()
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/(^-|-$)/g, '') + '-' + Math.random().toString(36).slice(2,7);
}

document.getElementById('intake-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const statusEl = document.getElementById('status');
  statusEl.className = ''; statusEl.style.display = 'none';

  const businessName = document.getElementById('business-name').value.trim();
  const email = document.getElementById('contact-email').value.trim();
  const portPreference = document.getElementById('port-preference').value.trim();
  const links = Array.from(document.querySelectorAll('.link-input'))
    .map(i => i.value.trim()).filter(Boolean);

  if(links.length === 0){
    statusEl.textContent = "Add at least one link before submitting.";
    statusEl.className = 'err';
    return;
  }

  const clientId = slugify(businessName);

  btn.disabled = true; btn.textContent = "Setting up...";

  try{
    const res = await fetch(WEBHOOK_URL, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        client_id: clientId,
        client_name: businessName,
        email: email,
        links: links,
        port_preference: portPreference
      })
    });

    if(!res.ok) throw new Error("Request failed");

    statusEl.innerHTML = `You're set up! Your personal report page:<br>
      <strong>${location.origin}${location.pathname.replace('yacht-intake','yacht-dashboard')}?client=${clientId}</strong><br>
      Bookmark it — no login needed. Your first report generates this coming Monday.`;
    statusEl.className = 'ok';
    document.getElementById('intake-form').reset();
    container.innerHTML = '<div class="link-row"><input type="url" class="link-input" placeholder="https://" required></div>';
  }catch(err){
    statusEl.textContent = "Something went wrong submitting your links. Please try again or email us directly.";
    statusEl.className = 'err';
  }finally{
    btn.disabled = false; btn.textContent = "Set up my weekly report";
  }
});
</script>
</body>
</html>
