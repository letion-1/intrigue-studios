<svg width="100%" height="100%" viewBox="0 0 680 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
<rect width="680" height="900" fill="#1a0a00"/>

<!-- Amber glow center -->
<radialGradient id="ga" cx="50%" cy="40%" r="60%">
  <stop offset="0%" stop-color="#f97316" stop-opacity="0.4"/>
  <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
</radialGradient>
<rect width="680" height="900" fill="url(#ga)"/>

<!-- Bright amber top burst -->
<radialGradient id="gb" cx="50%" cy="0%" r="55%">
  <stop offset="0%" stop-color="#fb923c" stop-opacity="0.45"/>
  <stop offset="100%" stop-color="#fb923c" stop-opacity="0"/>
</radialGradient>
<rect width="680" height="900" fill="url(#gb)"/>

<!-- Deep red glow bottom left -->
<radialGradient id="gr" cx="0%" cy="100%" r="50%">
  <stop offset="0%" stop-color="#dc2626" stop-opacity="0.3"/>
  <stop offset="100%" stop-color="#dc2626" stop-opacity="0"/>
</radialGradient>
<rect width="680" height="900" fill="url(#gr)"/>

<!-- Yellow highlight top right -->
<radialGradient id="gy" cx="100%" cy="0%" r="40%">
  <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.25"/>
  <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
</radialGradient>
<rect width="680" height="900" fill="url(#gy)"/>

<!-- LARGE BARBELL CENTER -->
<g opacity="0.3">
  <rect x="120" y="430" width="440" height="14" rx="7" fill="#fbbf24"/>
  <rect x="108" y="405" width="38" height="64" rx="6" fill="#f97316"/>
  <rect x="152" y="413" width="24" height="48" rx="5" fill="#fb923c"/>
  <rect x="504" y="413" width="24" height="48" rx="5" fill="#fb923c"/>
  <rect x="534" y="405" width="38" height="64" rx="6" fill="#f97316"/>
  <rect x="178" y="425" width="12" height="24" rx="3" fill="#fbbf24"/>
  <rect x="490" y="425" width="12" height="24" rx="3" fill="#fbbf24"/>
</g>

<!-- DUMBBELL top left -->
<g opacity="0.32" transform="rotate(-20 80 160)">
  <rect x="38" y="154" width="84" height="8" rx="4" fill="#fbbf24"/>
  <rect x="28" y="142" width="18" height="32" rx="4" fill="#f97316"/>
  <rect x="48" y="146" width="12" height="24" rx="3" fill="#fb923c"/>
  <rect x="100" y="146" width="12" height="24" rx="3" fill="#fb923c"/>
  <rect x="114" y="142" width="18" height="32" rx="4" fill="#f97316"/>
  <rect x="62" y="151" width="6" height="14" rx="2" fill="#fbbf24"/>
  <rect x="92" y="151" width="6" height="14" rx="2" fill="#fbbf24"/>
