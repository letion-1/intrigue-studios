<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleet Availability — Intrigue Studios</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1C2333;
    --gold: #B08D57;
    --cream: #F5F3EC;
    --paper: #FFFFFF;
    --line: #E8E6DF;
    --ink-soft: #6B6B63;
    --ok: #2E6B4F;
    --err: #B03A3A;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: var(--cream);
    font-family: 'Work Sans', sans-serif;
    color: var(--navy);
    padding: 40px 20px;
  }
  .page-center {
    width: 100%;
    max-width: 460px;
    margin: auto;
  }
  .card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 40px 36px;
  }
  .eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    margin: 0 0 10px;
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-size: 30px;
    font-weight: 700;
    margin: 0 0 12px;
    line-height: 1.15;
  }
  .lede {
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.5;
    margin: 0 0 28px;
  }
  label {
    display: block;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .date-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 22px;
  }
  input[type="date"] {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: 3px;
    font-family: 'Work Sans', sans-serif;
    font-size: 14px;
    color: var(--navy);
    background: var(--paper);
  }
  input[type="date"]:focus {
    outline: 2px solid var(--gold);
    outline-offset: 1px;
  }
  button.primary {
    width: 100%;
    padding: 14px;
    background: var(--navy);
    color: var(--paper);
    border: none;
    border-radius: 3px;
    font-family: 'Work Sans', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  button.primary:hover { background: #2A3346; }
  button.primary:disabled { background: #9A9A93; cursor: wait; }
  button.primary:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

  .result {
    margin-top: 22px;
    padding: 20px;
    border: 1px solid var(--line);
    border-radius: 3px;
    background: var(--cream);
    text-align: center;
  }
  .result.hidden { display: none; }
  .result-title {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 16px;
    margin: 0 0 4px;
  }
  .result-sub {
    font-size: 12.5px;
    color: var(--ink-soft);
    margin: 0 0 16px;
    line-height: 1.5;
  }
  a.download-btn {
    display: block;
    padding: 13px;
    background: var(--gold);
    color: var(--navy);
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    border-radius: 3px;
  }
  a.download-btn:hover { background: #9C7A48; }
  a.download-btn.hidden { display: none; }

  .result.error .result-title { color: var(--err); }
  .result.success .result-title { color: var(--ok); }

  .range-note {
    font-family: 'Space Mono', monospace;
    font-size: 10.5px;
    color: var(--ink-soft);
    margin-top: 14px;
    text-align: center;
  }

  footer {
    margin-top: 32px;
    text-align: center;
    font-size: 12px;
    color: var(--ink-soft);
  }
  footer a { color: var(--ink-soft); }
</style>
</head>
<body>

<div class="page-center">
  <div class="card">
    <p class="eyebrow">Fleet Availability</p>
    <h1>Your fleet</h1>
    <p class="lede">Pick a date range and check availability across all your linked sources.</p>

    <div class="date-row">
      <div>
        <label for="dateFrom">From</label>
        <input type="date" id="dateFrom">
      </div>
      <div>
        <label for="dateTo">To</label>
        <input type="date" id="dateTo">
      </div>
    </div>

    <button class="primary" id="checkBtn" type="button">Check availability</button>

    <div class="result hidden" id="resultBox">
      <p class="result-title" id="resultTitle"></p>
      <p class="result-sub" id="resultSub"></p>
      <a class="download-btn hidden" id="downloadBtn" target="_blank" rel="noopener noreferrer">Download PDF</a>
    </div>

    <p class="range-note" id="rangeNote"></p>
  </div>

  <footer>
    <p>Intrigue Studios · <a href="mailto:team@intriguestudios.de">team@intriguestudios.de</a></p>
  </footer>
</div>

<script>
  const WEBHOOK_URL = "https://hook.eu2.make.com/2f1f2r9nxig9u9isjvmlkm7njuobops5";

  const params = new URLSearchParams(window.location.search);
  const clientId = params.get("client") || "";

  const dateFrom = document.getElementById("dateFrom");
  const dateTo = document.getElementById("dateTo");
  const checkBtn = document.getElementById("checkBtn");
  const resultBox = document.getElementById("resultBox");
  const resultTitle = document.getElementById("resultTitle");
  const resultSub = document.getElementById("resultSub");
  const downloadBtn = document.getElementById("downloadBtn");
  const rangeNote = document.getElementById("rangeNote");

  // Default range: today through +7 days
  const today = new Date();
  const weekOut = new Date(today);
  weekOut.setDate(today.getDate() + 7);
  const toISODate = (d) => d.toISOString().slice(0, 10);
  dateFrom.value = toISODate(today);
  dateTo.value = toISODate(weekOut);

  function showResult(state, title, sub, pdfUrl) {
    resultBox.classList.remove("hidden", "success", "error");
    resultBox.classList.add(state);
    resultTitle.textContent = title;
    resultSub.textContent = sub;

    if (pdfUrl) {
      downloadBtn.classList.remove("hidden");
      downloadBtn.href = pdfUrl;
    } else {
      downloadBtn.classList.add("hidden");
      downloadBtn.removeAttribute("href");
    }
  }

  checkBtn.addEventListener("click", async () => {
    if (!clientId) {
      showResult("error", "Missing client link", "This dashboard link is incomplete. Please use the link from your login email.", null);
      return;
    }

    checkBtn.disabled = true;
    checkBtn.textContent = "Checking…";
    rangeNote.textContent = dateFrom.value + " to " + dateTo.value;

    try {
      const res = await fetch(WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          client_id: clientId,
          date_from: dateFrom.value,
          date_to: dateTo.value
        })
      });

      const rawText = (await res.text()).trim().replace(/^"|"$/g, "");

      // The webhook returns the full, absolute PDF URL as plain text.
      // Never treat this as a filename or a path relative to this site.
      if (!res.ok || !rawText || rawText.indexOf("https://") !== 0) {
        showResult(
          "error",
          "No report ready yet for this range.",
          "Reports generate on request — this may be your first check, or this date range hasn't been processed yet.",
          null
        );
        return;
      }

      showResult("success", "Your report is ready.", "", rawText);
    } catch (err) {
      showResult(
        "error",
        "Something went wrong.",
        "Please try again in a moment, or contact support if this keeps happening.",
        null
      );
    } finally {
      checkBtn.disabled = false;
      checkBtn.textContent = "Check availability";
    }
  });
</script>

</body>
</html>
