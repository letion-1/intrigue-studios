  <circle cx="600" cy="720" r="35" fill="none" stroke="#f97316" stroke-width="3"/>
  <circle cx="600" cy="720" r="10" fill="#fbbf24"/>
  <line x1="600" y1="665" x2="600" y2="685" stroke="#fbbf24" stroke-width="2.5"/>
  <line x1="600" y1="755" x2="600" y2="775" stroke="#fbbf24" stroke-width="2.5"/>
  <line x1="545" y1="720" x2="565" y2="720" stroke="#fbbf24" stroke-width="2.5"/>
  <line x1="635" y1="720" x2="655" y2="720" stroke="#fbbf24" stroke-width="2.5"/>
</g>

<!-- KETTLEBELL right middle -->
<g opacity="0.26">
  <path d="M590 540 Q590 508 620 508 Q650 508 650 540" fill="none" stroke="#fbbf24" stroke-width="10" stroke-linecap="round"/>
  <ellipse cx="620" cy="558" rx="32" ry="28" fill="#f97316"/>
  <rect x="596" y="578" width="48" height="8" rx="4" fill="#f97316"/>
  <ellipse cx="610" cy="548" rx="8" ry="6" fill="#fbbf24" opacity="0.4"/>
</g>

<!-- KETTLEBELL left small -->
<g opacity="0.22">
  <path d="M50 320 Q50 298 68 298 Q86 298 86 320" fill="none" stroke="#fbbf24" stroke-width="8" stroke-linecap="round"/>
  <ellipse cx="68" cy="334" rx="22" ry="20" fill="#f97316"/>
  <rect x="50" y="348" width="36" height="6" rx="3" fill="#f97316"/>
</g>

<!-- Second barbell lower -->
<g opacity="0.15">
  <rect x="150" y="620" width="380" height="10" rx="5" fill="#fbbf24"/>
  <rect x="140" y="602" width="28" height="46" rx="5" fill="#f97316"/>
  <rect x="170" y="608" width="18" height="34" rx="4" fill="#fb923c"/>
  <rect x="492" y="608" width="18" height="34" rx="4" fill="#fb923c"/>
  <rect x="512" y="602" width="28" height="46" rx="5" fill="#f97316"/>
</g>

<!-- Dot accents top -->
<g fill="#fbbf24" opacity="0.35">
  <circle cx="200" cy="80" r="2"/><circle cx="220" cy="68" r="1.5"/>
  <circle cx="240" cy="85" r="2"/><circle cx="210" cy="96" r="1.5"/>
</g>
<g fill="#dc2626" opacity="0.35">
  <circle cx="460" cy="780" r="2"/><circle cx="480" cy="768" r="1.5"/>
  <circle cx="500" cy="783" r="2"/><circle cx="470" cy="793" r="1.5"/>
</g>

<!-- Top fade -->
<linearGradient id="ft" x1="0" y1="1" x2="0" y2="0">
  <stop offset="80%" stop-color="#1a0a00" stop-opacity="0"/>
  <stop offset="100%" stop-color="#1a0a00" stop-opacity="0.85"/>
</linearGradient>
<rect width="680" height="900" fill="url(#ft)"/>

<!-- Bottom fade -->
<linearGradient id="fb" x1="0" y1="0" x2="0" y2="1">
  <stop offset="75%" stop-color="#1a0a00" stop-opacity="0"/>
  <stop offset="100%" stop-color="#1a0a00" stop-opacity="1"/>
</linearGradient>
<rect width="680" height="900" fill="url(#fb)"/>

</svg>
